<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Veille Informatique - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <nav class="navbar">
        <a href="index.html" class="nav-link active">Accueil</a>
        <a href="certifications.html" class="nav-link">Certifications</a>
        <a href="projets.html" class="nav-link">Projets</a>
        <a href="Veille.html" class="nav-link">Veille</a>
    </nav>
</head>
<body>

<div class="container">
    <h1>Veille Informatique</h1>
    
    <div class="filtre-container">
        <select id="menu-filtre">
            <option value="Toutes">Afficher toutes les sources</option>
            </select>
    </div>

    <div id="zone-veille" class="grille-veille">
        </div>
</div>

<script>
    // Variables globales pour stocker les données
    let donneesVeille = {};

    // Fonction pour afficher les cartes selon la source choisie
    function afficherCartes(filtreSource) {
        const grille = document.getElementById('zone-veille');
        grille.innerHTML = ''; // On vide la grille

        for (const [source, articles] of Object.entries(donneesVeille)) {
            // Si le filtre est actif, on passe les sources qui ne correspondent pas
            if (filtreSource !== 'Toutes' && filtreSource !== source) continue;

            articles.forEach(article => {
                const card = document.createElement('a');
                card.className = 'carte-article';
                card.href = article.lien;
                card.target = '_blank'; // Ouvre dans un nouvel onglet

                card.innerHTML = `
                    <img class="carte-image" src="${article.image}" alt="Image technique">
                    <div class="carte-corps">
                        <span class="badge-source">${source}</span>
                        <h3 class="carte-titre">${article.titre}</h3>
                        <span class="carte-date">📅 ${article.date}</span>
                    </div>
                `;
                grille.appendChild(card);
            });
        }
    }

    // 1. Récupération du fichier JSON
    fetch('veille.json')
        .then(response => response.json())
        .then(data => {
            donneesVeille = data;
            const menu = document.getElementById('menu-filtre');

            // 2. Remplissage du menu déroulant avec les noms des sites
            for (const source in data) {
                const option = document.createElement('option');
                option.value = source;
                option.textContent = source;
                menu.appendChild(option);
            }

            // 3. Affichage initial de toutes les cartes
            afficherCartes('Toutes');
        })
        .catch(error => {
            document.getElementById('zone-veille').innerHTML = "<p style='color:red;'>Erreur : Impossible de charger le fichier JSON. N'oublie pas de lancer ton serveur local Python !</p>";
        });

    // 4. Action quand on utilise le menu déroulant
    document.getElementById('menu-filtre').addEventListener('change', function() {
        afficherCartes(this.value);
    });
</script>

</body>
</html>
