<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lucas OMAN</title>
    <style>
        /* --- THÈME ESPACE & ÉTOILES --- */
    body {
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    
        /* Couleur de fond de secours */
        background-color: #090c15; 
    
        /* 1. Le dégradé noir bleuté (façon interface moderne) + 2. Les étoiles */
        background-image: 
            radial-gradient(ellipse at center, #1a243d 0%, #090c15 100%),
            radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px),
            radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px),
            radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px);
        background-size: 100% 100%, 550px 550px, 350px 350px, 250px 250px;
        background-position: 0 0, 0 0, 40px 60px, 130px 270px;
    
        color: #ffffff;
        min-height: 100vh;
}

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.8);
            margin-bottom: 40px;
        }

        /* --- MENU DÉROULANT --- */
        .filtre-container {
            text-align: center;
            margin-bottom: 40px;
        }

        select {
            padding: 12px 24px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            backdrop-filter: blur(10px); /* Effet verre */
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        select:hover {
            border-color: #00bfff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
        }

        select option {
            background: #1b2735;
            color: #fff;
        }

        /* --- GRILLE & CARTES (GLASSMORPHISM) --- */
        .grille-veille {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .carte-article {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px); /* Effet verre poli */
            text-decoration: none;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .carte-article:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 191, 255, 0.3);
            border-color: rgba(0, 191, 255, 0.5);
        }

        .carte-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .carte-corps {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .badge-source {
            background: linear-gradient(45deg, #00bfff, #005f99);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            width: fit-content;
            margin-bottom: 15px;
            box-shadow: 0 2px 10px rgba(0, 191, 255, 0.4);
        }

        .carte-titre {
            font-size: 16px;
            margin: 0 0 15px 0;
            line-height: 1.5;
            color: #FFFFFF;
            font-weight: bold;
        }

        .carte-date {
            font-size: 13px;
            color: #FFFFFF;
            margin-top: auto;
        }
    </style>
</head>
