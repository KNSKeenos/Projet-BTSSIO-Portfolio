name: Mise à jour Veille 7h00

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  update-veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Préparer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Installer Feedparser
        run: pip install feedparser
        
      - name: Exécuter le script
        run: python Veille_tech_json.py
        
      # Git fait fais des siennes alors bah buldozer hein
      - name: Sauvegarder le résultat
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "MAJ Automatique de la veille"
          file_pattern: 'veille.json'
